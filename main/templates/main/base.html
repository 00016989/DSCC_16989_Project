<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Original Mart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #111827;
        }

        /* Remove ugly link underline globally */
        a {
            text-decoration: none;
        }

        /* ================= BRAND COLORS ================= */
        :root {
            --primary: #2196F3;
            --primary-dark: #1976D2;
        }

        /* ================= NAVBAR ================= */
        nav {
            background-color: #111827;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            align-items: center;
        }

        .nav-links a {
            color: #e5e7eb;
            margin-left: 25px;
            font-weight: 500;
            position: relative;
            transition: 0.3s;
        }

        /* Smooth hover underline animation */
        .nav-links a::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            left: 0;
            bottom: -4px;
            background-color: var(--primary);
            transition: 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: white;
        }

        /* ================= BUTTON SYSTEM ================= */
        .btn {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .btn:hover {
            background-color: var(--primary-dark);
        }

        .btn-danger {
            background-color: #f44336;
        }

        .btn-danger:hover {
            background-color: #d32f2f;
        }

        .btn-success {
            background-color: #4CAF50;
        }

        .btn-success:hover {
            background-color: #388e3c;
        }

        .logout-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-weight: bold;
            cursor: pointer;
            margin-left: 20px;
            font-size: 15px;
            transition: 0.3s;
        }

        .logout-btn:hover {
            color: white;
        }

        /* ================= CATEGORY BUTTONS ================= */
        .category-btn {
            padding: 8px 18px;
            border-radius: 20px;
            background-color: #e5e7eb;
            color: #111827;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .category-btn:hover {
            background-color: var(--primary);
            color: white;
        }

        .active-category {
            background-color: var(--primary);
            color: white;
        }

        /* ================= FORM INPUTS ================= */
        input[type="text"],
        input[type="password"],
        input[type="email"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* ================= CONTENT ================= */
        .container {
            flex: 1;
            max-width: 1100px;
            margin: auto;
            padding: 40px 20px;
            width: 100%;
        }

        h1, h2, h3 {
            margin-bottom: 15px;
        }

        /* ================= FOOTER ================= */
        footer {
            text-align: center;
            padding: 20px;
            background-color: #111827;
            color: #9ca3af;
            font-size: 14px;
        }

        /* ================= RESPONSIVE ================= */
        @media (max-width: 768px) {

            nav {
                flex-direction: column;
                align-items: flex-start;
            }

            .nav-links {
                margin-top: 10px;
                flex-wrap: wrap;
            }

            .nav-links a {
                margin-left: 0;
                margin-right: 15px;
                margin-bottom: 8px;
            }

        }
    </style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav>
    <a href="{% url 'home' %}" class="logo">Original Mart</a>

    <div class="nav-links">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'products' %}">Products</a>
        <a href="{% url 'feedback_list' %}">Feedback</a>

        {% if user.is_authenticated %}

            {% if user.is_staff %}
                <a href="{% url 'product_add' %}" class="btn">Add Product</a>
            {% endif %}

            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="logout-btn">Logout</button>
            </form>

        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}" class="btn">Register</a>
        {% endif %}
    </div>
</nav>

<!-- ================= PAGE CONTENT ================= -->
<div class="container">
    {% block content %}
    {% endblock %}
</div>

<!-- ================= FOOTER ================= -->
<footer>
    © 2026 Original Market | Built with Django
</footer>

</body>
</html>
